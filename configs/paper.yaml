run_name: paper
seed: 42
device: auto

# Dataset
primary_dataset: wmt14
dataset_config: de-en
fallback_dataset: opus_books
fallback_config: en-de
src_lang: en
tgt_lang: de
train_samples: 100000
valid_samples: 3000
test_samples: 3000
max_seq_len: 96

# Tokenizer/model
hf_tokenizer: Helsinki-NLP/opus-mt-en-de
d_model: 512
num_heads: 8
num_encoder_layers: 6
num_decoder_layers: 6
dim_feedforward: 2048
dropout: 0.1

# Training
batch_size: 16
grad_accum_steps: 8
epochs_stage1: 5
epochs_stage2: 3
lr_stage1: 0.0001
lr_stage2: 0.00001
label_smoothing: 0.1
grad_clip: 1.0
wait_k: 3

# Reward weights
lambda_erasure: 0.10
lambda_latency: 0.05
lambda_delay: 0.02
gamma: 0.95

# Evaluation
waitk_values: [1, 3, 5, 7]
max_new_tokens: 96
deterministic: true
use_comet: false
output_dir: outputs/paper
