run_name: smoke
seed: 42
device: auto

# Dataset
primary_dataset: wmt14
dataset_config: de-en
fallback_dataset: opus_books
fallback_config: en-de
src_lang: en
tgt_lang: de
train_samples: 128
valid_samples: 64
test_samples: 64
max_seq_len: 48

# Tokenizer/model
hf_tokenizer: Helsinki-NLP/opus-mt-en-de
d_model: 128
num_heads: 4
num_encoder_layers: 2
num_decoder_layers: 2
dim_feedforward: 512
dropout: 0.1

# Training
batch_size: 8
grad_accum_steps: 1
epochs_stage1: 1
epochs_stage2: 1
lr_stage1: 0.0001
lr_stage2: 0.00001
label_smoothing: 0.1
grad_clip: 1.0
wait_k: 3

# Reward weights
lambda_erasure: 0.10
lambda_latency: 0.05
lambda_delay: 0.02
gamma: 0.95

# Evaluation
waitk_values: [1, 3]
max_new_tokens: 48
deterministic: true
use_comet: false
output_dir: outputs/smoke
